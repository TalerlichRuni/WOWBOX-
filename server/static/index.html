<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WOWBOX - Family Connection</title>
    <meta name="description" content="Send photos to your loved ones through WOWBOX, anytime, anywhere.">
    <meta name="theme-color" content="#FCF9F2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="heart heart-1"></div>
        <div class="heart heart-2"></div>
        <div class="heart heart-3"></div>
    </div>

    <!-- ═══════════════════ LOGIN SCREEN ═══════════════════ -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="login-card glass">
                <div class="login-header">
                    <div class="logo-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                           <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                    </div>
                    <h1 class="logo-text">WOWBOX</h1>
                    <p class="login-subtitle">by MiLab</p>
                </div>

                <form id="login-form" autocomplete="off">
                    <div class="input-group">
                        <div class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </div>
                        <input type="password" id="password-input" placeholder="Enter Password" required autocomplete="current-password">
                    </div>
                    <button type="submit" id="login-btn" class="btn btn-primary btn-full">
                        <span class="btn-text">Connect</span>
                        <div class="btn-loader hidden">
                            <div class="spinner-small"></div>
                        </div>
                    </button>
                    <p id="login-error" class="error-text hidden"></p>
                </form>
            </div>
        </div>
    </div>

    <!-- ═══════════════════ MAIN APP SCREEN ═══════════════════ -->
    <div id="app-screen" class="screen">

        <!-- Header -->
        <header class="app-header glass-subtle">
            <div class="header-content">
                <div class="header-brand">
                    <svg class="header-logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                    <span class="header-title">WOWBOX</span>
                </div>
                <div class="header-actions">
                    <div id="agent-status" class="agent-badge offline" title="Printer Status">
                        <span class="agent-dot"></span>
                        <span class="agent-label">Searching...</span>
                    </div>
                    <button id="logout-btn" class="btn-icon" title="Logout">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">

            <!-- Upload Section -->
            <section class="upload-section">
                <div id="upload-zone" class="upload-zone glass">
                    <input type="file" id="file-input" accept="image/*" hidden>
                    <div class="upload-zone-content">
                        <div class="upload-icon-wrap">
                            <svg class="upload-icon" width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                            </svg>
                        </div>
                        <div class="upload-btn-simulator">
                            <span class="btn-text">Select Photo</span>
                        </div>
                        <p class="upload-text-formats">JPG, PNG, GIF, WEBP, HEIC • Max 20MB</p>
                    </div>
                </div>
            </section>

            <!-- Preview Section (hidden by default) -->
            <section id="preview-section" class="preview-section hidden">
                <div class="preview-card glass">
                    <div class="preview-header">
                        <h3>Preview</h3>
                        <button id="preview-close" class="btn-icon-small" title="Cancel">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="preview-image-container">
                        <div class="preview-frame">
                            <img id="preview-image" src="" alt="Preview">
                        </div>
                    </div>
                    <div class="preview-info">
                        <span id="preview-filename" class="preview-filename"></span>
                        <span id="preview-filesize" class="preview-filesize"></span>
                    </div>
                    <button id="send-print-btn" class="btn btn-primary btn-full btn-glow">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                        <span class="btn-text">Send with Love</span>
                        <div class="btn-loader hidden">
                            <div class="spinner-small"></div>
                        </div>
                    </button>
                </div>
            </section>

            <!-- Queue Section -->
            <section class="queue-section">
                <div class="queue-header">
                    <h2 class="section-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="8" y1="6" x2="21" y2="6"></line>
                            <line x1="8" y1="12" x2="21" y2="12"></line>
                            <line x1="8" y1="18" x2="21" y2="18"></line>
                            <line x1="3" y1="6" x2="3.01" y2="6"></line>
                            <line x1="3" y1="12" x2="3.01" y2="12"></line>
                            <line x1="3" y1="18" x2="3.01" y2="18"></line>
                        </svg>
                        Printing Queue
                    </h2>
                    <button id="clear-queue-btn" class="btn-text-small hidden" title="Clear history">
                        Clear History
                    </button>
                </div>

                <div id="queue-list" class="queue-list">
                    <!-- Queue items will be rendered by JS -->
                </div>

                <div id="queue-empty" class="queue-empty">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                    <p>No photos yet</p>
                    <p class="queue-empty-sub">Send a photo to brighten their day!</p>
                </div>
            </section>

        </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/static/app.js"></script>
</body>
</html>
